<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitPulse - GitHub Profile Finder</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="logo-wrapper">
                <div class="logo-icon-box">
                    <i class="fa-brands fa-github"></i>
                    <i class="fa-solid fa-satellite-dish pulse-radar-icon"></i>
                </div>
                <h1 class="logo-text">Git<span>Pulse</span></h1>
            </div>
            <p class="app-subtitle">Enterprise-grade profile analytics engine for developers</p>
        </header>

        <section class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-bar-icon"></i>
                <input type="text" id="usernameInput" placeholder="Enter GitHub username (e.g., torvalds)..." autocomplete="off">
                <div id="inlineLoader" class="inline-spinner">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                </div>
            </div>
        </section>

        <main id="profileResult" class="result-section">
            
            <div id="errorPanel" class="error-panel">
                <i class="fa-solid fa-triangle-exclamation error-icon"></i>
                <div class="error-details">
                    <h3>User Not Found</h3>
                    <p>The requested GitHub profile does not exist or API limit reached.</p>
                </div>
            </div>

            <div id="skeletonTemplate" class="profile-card skeleton-active">
                <div class="profile-header-block">
                    <div class="skeleton-element skeleton-avatar"></div>
                    <div class="skeleton-header-info">
                        <div class="skeleton-element skeleton-line title-line"></div>
                        <div class="skeleton-element skeleton-line sub-line"></div>
                    </div>
                </div>
                <div class="skeleton-element skeleton-line body-line"></div>
                <div class="skeleton-element skeleton-line body-line-short"></div>
                <div class="skeleton-stats-grid">
                    <div class="skeleton-element skeleton-stat-box"></div>
                    <div class="skeleton-element skeleton-stat-box"></div>
                    <div class="skeleton-element skeleton-stat-box"></div>
                </div>
            </div>

            <div id="realDataContainer" class="profile-card data-hidden"></div>

        </main>

        <footer class="app-footer">
            <p>Powered by GitHub REST API v3 // DevScope Core</p>
        </footer>

    </div>

    <script src="main.js"></script>
</body>
</html>
